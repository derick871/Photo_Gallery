<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NutriTrack{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <div class="container pt-5 pb-2">
        <header class="mb-4 d-flex justify-content-between align-items-center border-bottom pb-3">
            <div>
                <h1 class="fw-bold text-dark m-0"><i class="fa-solid fa-seedling text-success me-2"></i>NutriTrack</h1>
                <p class="text-muted m-0 small">Clean metrics-driven nutritional dashboard</p>
            </div>
            <nav class="d-flex gap-3">
                <a href="#" class="btn btn-sm btn-outline-secondary fw-semibold">Dashboard</a>
                <a href="#" class="btn btn-sm btn-outline-danger fw-semibold">Logout</a>
            </nav>
        </header>
    </div>

    <main class="container pb-5">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
