<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - NutriTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card p-4 shadow-sm border-0" style="width: 360px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold m-0">Create Account</h3>
            <small class="text-muted">Start keeping tabs on your nutrition</small>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                    <div class="alert alert-{{ 'danger' if cat == 'error' else cat }} p-2 small border-0 mb-3">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-semibold py-2">Register</button>
        </form>
        
        <p class="text-center mt-4 small text-muted">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none">Log In</a></p>
    </div>

</body>
</html>
