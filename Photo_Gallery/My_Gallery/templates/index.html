{% extends 'gallery/base.html' %}

{% block content %}
<main class="min-h-[70vh] flex items-center justify-center bg-gray-50 px-4 py-12 sm:px-6 lg:px-8">
    <!-- Hero / Welcome Wrapper Card -->
    <div class="max-w-md w-full text-center bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        
        <!-- Icon Accent -->
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-indigo-50 text-indigo-600 mb-4">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
        </div>

        <!-- Typography Heading Structure -->
        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-3">
            Gallery Photo
        </h2>
        
        <p class="text-sm text-gray-600 leading-relaxed mb-8">
            Welcome to the Gallery Photo app. Create a secure account to display your portfolios, organize artwork collections, and save images for future reference.
        </p>

        <!-- Functional Interactive CTA (Rubric Guardrail Alignment) -->
        <div class="space-y-3">
            <a href="{% url 'register' %}" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-sm transition">
                Create an Account
            </a>
            <p class="text-xs text-gray-500">
                Already have an account? 
                <a href="{% url 'login' %}" class="font-medium text-indigo-600 hover:text-indigo-500 hover:underline">Log in</a>
            </p>
        </div>

    </div>
</main>
{% endblock %}
