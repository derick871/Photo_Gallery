{% extends 'base.html' %}
{% block title %}Create Account - Photo Gallery{% endblock %}

{% block content %}
<main class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-md">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black tracking-tight text-gray-900">Create Account</h1>
            <p class="text-sm text-gray-500 mt-1">Start keeping tabs on your photos</p>
        </div>

        <!-- Registration Form -->
        <form method="POST" class="space-y-5">
            {% csrf_token %} 
            
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Username</label>
                <input type="text" name="username" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2.5" placeholder="username123" required>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Email Address</label>
                <input type="email" name="email" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2.5" placeholder="name@example.com" required>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">Password</label>
                <input type="password" name="password" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm py-2.5" placeholder="Min. 8 characters" required>
            </div>

            <button type="submit" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg shadow-sm transition focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
                Register Account
            </button>
        </form>
        
        <p class="text-center mt-6 text-sm text-gray-500">
            Already have an account? 
            <a href="{% url 'login' %}" class="font-semibold text-indigo-600 hover:text-indigo-500">Log In</a>
        </p>
    </div>
</main>
{% endblock %}
