{% extends "base.html" %}
{% block content %}
<main class="max-w-2xl bg-slate-900 text-amber-700 mx-auto px-4 py-10">
    <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-white">Edit Photos</h1>
        <p class="text-sm text-amber-500 mt-1">Update images and manage your gallery .</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-8">
        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <!-- Current Asset Preview using URL -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Current Photo Preview</label>
                <div class="flex flex-col sm:flex-row items-start gap-4">
                    <img src="{{ photo.image_url }}" alt="{{ photo.title }}" class="w-32 h-32 object-cover rounded-lg border border-gray-200 shadow-sm bg-gray-50">
                    <div class="flex-1 w-full">
                        <label for="id_image_url" class="block text-xs font-semibold text-gray-500 mb-1">Photo Image URL</label>
                        <!-- Plain text input for the URL -->
                        <input type="url" name="image_url" id="id_image_url" value="{{ photo.image_url }}" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm" placeholder="https://example.com/image.jpg">
                    </div>
                </div>
            </div>

            <div>
                <label for="id_title" class="block text-sm font-semibold text-gray-700">Title</label>
                <input type="text" name="title" id="id_title" value="{{ photo.title }}" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm">
            </div>

            <div>
                <label for="id_description" class="block text-sm font-semibold text-gray-700">Description</label>
                <textarea name="description" id="id_description" rows="4" class="mt-1 block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm">{{ photo.description }}</textarea>
            </div>

            <div class="flex items-center justify-between pt-6 border-t border-gray-100">
                <a href="{% url 'photo_detail' photo.id %}" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition">Cancel changes</a>
                <button type="submit" class="px-5 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-lg shadow-sm hover:bg-indigo-700 transition">
                    Save Updates
                </button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
