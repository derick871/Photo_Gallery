{% extends 'base.html' %}
{% block content %}
<main class="max-w-4xl bg-slate-900 text-amber-700 mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        
        <div class="bg-gray-50 flex items-center justify-center p-4 sm:p-8 border-b border-gray-100">
            <img src="{{ photo.image_url }}" alt="{{ photo.title }}" class="max-h-[500px] w-auto object-contain rounded-xl shadow-md">
        </div>

        <div class="p-6 sm:p-10">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <div>
                    <h1 class="text-3xl font-extrabold text-white tracking-tight">{{ photo.title }}</h1>
                    <p class="text-sm text-gray-500 mt-1">
                        Uploaded by <span class="font-semibold text-gray-700">@{{ photo.uploaded_by.username }}</span> on {{ photo.uploaded_at|date:"F j, Y" }}
                    </p>
                </div>

                <div class="flex items-center gap-2">
                    <form action="{% url 'like_photo' photo.id %}" method="POST">
                        {% csrf_token %}
                        <button type="submit" class="flex items-center gap-1.5 px-4 py-2 rounded-xl bg-green-50 hover:bg-green-100 text-green-700 text-sm font-semibold border border-green-100 transition">
                             <span>{{ photo.total_likes }}</span>
                        </button>
                    </form>
                    <form action="{% url 'dislike_photo' photo.id %}" method="POST">
                        {% csrf_token %}
                        <button type="submit" class="flex items-center gap-1.5 px-4 py-2 rounded-xl bg-red-50 hover:bg-red-100 text-red-700 text-sm font-semibold border border-red-100 transition">
                            <span>{{ photo.total_dislikes }}</span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="prose max-w-none text-gray-600 mb-8">
                <p class="leading-relaxed">{{ photo.description|default:"No description provided for this artwork." }}</p>
            </div>
        </div>
    </div>
</main>
{% endblock %}
